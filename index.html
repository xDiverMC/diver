<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <title>Topup Credits Arvenia Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="image.png">
  
  <link rel="stylesheet" href="template.css" />
  <link rel="stylesheet" href="home.css" />
  
  <meta name="discount" content="0.40" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <meta property="og:title" content="Topup Credits Arvenia">
  <meta property="og:description" content="Website untuk topup Credits di server Minecraft Arvenia.">
  <meta property="og:image" content="https://media.discordapp.net/attachments/1135145482797207622/1218410978610511872/image.png">
  <meta property="og:url" content="https://store.arvenia.xyz/">

  <style>
    .coin-price {
      text-align: center;
      margin-top: 5px;
    }
    .coin-price .original-price {
      text-decoration: line-through;
      color: #ff0101;
      display: block;
      font-size: 14px;
    }
    .coin-price .discounted-price {
      font-weight: bold;
      font-size: 22px;
      color: #2ecc71; /* Warna hijau biar terlihat premium */
    }
    /* Sembunyikan iframe jika tidak diperlukan langsung */
    #trIframe {
      display: none;
    }
  </style>
</head>

<body>
  <nav>
    <input type="checkbox" id="check" />
    <label for="check" class="checkbtn">
      <img src="assets/img/button.svg" alt="menu" />
    </label>
    <label class="logo">Arvenia Topup</label>
    <ul>
      <li><a class="active" href="#">Home</a></li>
      <li><a href="https://discord.gg/arvenia" target="_blank">Discord Server</a></li>
    </ul>
  </nav>

  <div class="header">
    <div class="text">
      <h1 id="playerName">Loading...</h1>
      <p>Selamat datang di website Topup Arvenia. Klik tombol di bawah jika ingin mengganti akun.</p>
      <div class="logout">
        <button class="button" id="logoutBtn" style="cursor:pointer;">Log out</button>
      </div>
    </div>
    <div class="banner"></div>
  </div>

  <div class="container">
    <div class="coin-list" id="coinList">
      <div class="coin" data-price="5000">
        <p><b>500</b><br>Credits</p>
        <div class="coin-price"></div>
      </div>
      <div class="coin" data-price="10000">
        <p><b>1K</b><br>Credits</p>
        <div class="coin-price"></div>
      </div>
      <div class="coin" data-price="25000">
        <p><b>2.5K</b><br>Credits</p>
        <div class="coin-price"></div>
      </div>
      <div class="coin" data-price="50000">
        <p><b>5K</b><br>Credits</p>
        <div class="coin-price"></div>
      </div>
      <div class="coin" data-price="100000">
        <p><b>10K</b><br>Credits</p>
        <div class="coin-price"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Arvenia Network. All rights reserved.</p>
  </footer>

  <script src="home.js"></script>
</body>
</html>
